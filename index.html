<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0d0d1a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Belly Ball">
  <link rel="manifest" href="manifest.json">
  <title>🐾 Belly Ball</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }

    html, body {
      width:100%; height:100%;
      background:#0d0d1a;
      font-family:'Segoe UI',sans-serif;
      color:#fff;
      overflow:hidden;
    }

    /* ── ROOT: fills viewport exactly ── */
    #root {
      width:100vw; height:100vh;
      display:flex; flex-direction:column;
      align-items:center; justify-content:flex-start;
      overflow:hidden;
    }

    /* ── TITLE: very small, hides on tiny screens ── */
    h1 {
      font-size: clamp(.75rem, 2.5vw, 1.8rem);
      letter-spacing:.1em;
      background:linear-gradient(90deg,#c792ea,#89ddff,#c3e88d);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
      text-align:center; line-height:1;
      padding: clamp(2px,.5vh,6px) 0;
      flex-shrink:0;
    }

    /* ── SCOREBOARD: compact, never wraps ── */
    #scoreboard {
      display:flex; gap: clamp(8px,3vw,40px);
      align-items:center; flex-shrink:0;
      padding: clamp(1px,.3vh,4px) 0;
    }
    .score-box { text-align:center; }
    .score-label { font-size: clamp(.45rem,1.2vw,.65rem); letter-spacing:.15em; color:#aaa; text-transform:uppercase; }
    .score-value { font-size: clamp(1.2rem,4vw,2.6rem); font-weight:700; line-height:1; }
    #p1-score { color:#89ddff; }
    #p2-score { color:#f07178; }
    #vs { font-size: clamp(.55rem,1.8vw,.9rem); color:#555; }
    .score-pop { animation: scorePop 0.4s ease-out; }
    @keyframes scorePop { 0%{transform:scale(1)} 40%{transform:scale(1.5)} 100%{transform:scale(1)} }
    .avatar-chip { display:flex; align-items:center; gap:4px; justify-content:center; margin-bottom:1px; }
    .avatar-chip img { width:clamp(16px,3vw,28px); height:clamp(16px,3vw,28px); border-radius:50%; border:2px solid #2a2a4a; object-fit:cover; }
    .chip-name { font-size:clamp(.45rem,1.2vw,.65rem); color:#aaa; }

    /* ── MAIN ROW: takes all remaining space ── */
    #main-row {
      display:flex; align-items:stretch; justify-content:center;
      flex:1; min-height:0; width:100%;
      gap: clamp(2px, 1vw, 12px);
      padding: 0 clamp(2px, .5vw, 8px);
    }

    /* ── SIDE PANELS: hide when viewport is narrow ── */
    .side-panel {
      display:flex; flex-direction:column; align-items:center;
      justify-content:space-evenly;
      flex-shrink:0;
      width: clamp(24px, 5vw, 70px);
      overflow:hidden;
    }
    /* Hide side panels on small landscape phones */
    @media (max-height: 420px) {
      .side-panel { display:none; }
    }
    .paw { font-size: clamp(8px, 1.8vw, 24px); opacity:.2; }
    .side-cat {
      width: clamp(20px, 3.5vw, 56px);
      height: clamp(20px, 3.5vw, 56px);
      border-radius:50%; object-fit:cover;
      border:2px solid #c792ea33;
      opacity:.5;
    }

    /* ── GAME WRAP: fills the middle column ── */
    #game-wrap {
      position:relative;
      flex:1; min-width:0; min-height:0;
      display:flex; align-items:center; justify-content:center;
    }

    /* ── CANVAS: letterbox inside game-wrap ── */
    canvas {
      display:block;
      max-width:100%; max-height:100%;
      width:100%; height:100%;
      object-fit:contain;
      aspect-ratio: 1100/650;
      border:2px solid #2a2a4a; border-radius:8px;
      box-shadow:0 0 30px rgba(137,221,255,.12);
      touch-action:none;
    }

    /* ── OVERLAY: fills canvas, scrolls internally ── */
    #overlay {
      position:absolute; inset:0;
      display:flex; flex-direction:column;
      align-items:center; justify-content:flex-start;
      background:rgba(13,13,26,.93);
      border-radius:6px;
      overflow-y:auto; overflow-x:hidden;
      -webkit-overflow-scrolling:touch;
      padding: clamp(6px,1.5vh,14px) clamp(6px,2vw,14px);
      gap: clamp(4px, 1vh, 10px);
      /* vertically center when content fits */
      justify-content:safe center;
    }
    /* Fallback for browsers that don't support "safe center" */
    @supports not (justify-content: safe center) {
      #overlay { justify-content: flex-start; padding-top: clamp(6px,3vh,20px); }
    }
    #overlay h2 { font-size:clamp(.85rem,2.5vw,1.4rem); color:#c792ea; text-align:center; flex-shrink:0; }
    #overlay p  { color:#aaa; font-size:clamp(.6rem,1.6vw,.78rem); text-align:center; line-height:1.5; flex-shrink:0; }

    /* ── BUTTONS ── */
    .play-btn {
      padding:clamp(5px,1.2vh,10px) clamp(12px,3.5vw,28px);
      border:none; border-radius:50px;
      font-size:clamp(.65rem,1.8vw,.9rem); font-weight:600; cursor:pointer;
      background:linear-gradient(135deg,#c792ea,#89ddff); color:#0d0d1a;
      flex-shrink:0;
    }
    .ghost-btn {
      padding:clamp(5px,1.2vh,10px) clamp(12px,3.5vw,28px);
      border:1px solid #c792ea; border-radius:50px;
      font-size:clamp(.65rem,1.8vw,.9rem); font-weight:600; cursor:pointer;
      background:transparent; color:#c792ea; flex-shrink:0;
    }
    .row { display:flex; gap:clamp(4px,1.5vw,10px); align-items:center; flex-wrap:wrap; justify-content:center; }
    .tog-btn {
      padding:clamp(4px,1vh,7px) clamp(8px,2.5vw,18px);
      border:1px solid #c792ea; border-radius:50px;
      font-size:clamp(.6rem,1.6vw,.8rem); cursor:pointer; background:transparent; color:#c792ea;
    }
    .tog-btn.active { background:#c792ea22; }
    .diff-btn {
      padding:clamp(4px,1vh,7px) clamp(6px,2vw,14px);
      border:1px solid #89ddff; border-radius:50px;
      font-size:clamp(.6rem,1.6vw,.8rem); cursor:pointer; background:transparent; color:#89ddff;
    }
    .diff-btn.active { background:#89ddff22; }

    /* ── AVATAR PICKER ── */
    .picker-label { font-size:clamp(.5rem,1.4vw,.7rem); letter-spacing:.1em; color:#aaa; text-transform:uppercase; margin-bottom:3px; flex-shrink:0; }
    .avatar-grid { display:flex; gap:clamp(3px,1vw,7px); flex-wrap:wrap; justify-content:center; max-width:min(260px,75vw); }
    .av-wrap { display:flex; flex-direction:column; align-items:center; }
    .av-opt {
      width:clamp(30px,5.5vw,48px); height:clamp(30px,5.5vw,48px);
      border-radius:50%; border:3px solid #2a2a4a;
      cursor:pointer; overflow:hidden; transition:transform .1s;
    }
    .av-opt img { width:100%; height:100%; object-fit:cover; border-radius:50%; }
    .av-opt:hover { transform:scale(1.1); }
    .av-opt.sel-p1 { border-color:#89ddff; box-shadow:0 0 8px #89ddff88; }
    .av-opt.sel-p2 { border-color:#f07178; box-shadow:0 0 8px #f0717888; }
    .av-name { font-size:clamp(.4rem,1.1vw,.55rem); color:#555; text-align:center; margin-top:2px; width:clamp(30px,5.5vw,52px); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

    /* ── BOTTOM STRIP ── */
    #speed-bar-wrap {
      display:flex; align-items:center; gap:5px;
      font-size:clamp(.5rem,1.3vw,.65rem); color:#444;
      padding:clamp(1px,.3vh,4px) 0; flex-shrink:0;
    }
    #speed-bar-bg { width:clamp(50px,8vw,100px); height:4px; background:#1e1e3a; border-radius:3px; overflow:hidden; }
    #speed-bar-fill { height:100%; width:0%; background:linear-gradient(90deg,#89ddff,#c792ea); border-radius:3px; transition:width .3s; }
    #ctrl-hint { color:#333; font-size:clamp(.45rem,1.2vw,.65rem); text-align:center; flex-shrink:0; padding-bottom:clamp(1px,.3vh,4px); }

    /* ── RESET BTN ── */
    #reset-btn {
      position:absolute; top:5px; right:5px;
      padding:clamp(3px,.8vh,5px) clamp(6px,1.8vw,11px);
      border:1px solid #2a2a4a; border-radius:50px;
      font-size:clamp(.45rem,1.2vw,.62rem); font-weight:600; cursor:pointer;
      background:rgba(13,13,26,.8); color:#444; z-index:10;
      transition:color .15s,border-color .15s;
    }
    #reset-btn:hover { color:#f07178; border-color:#f07178; }

    /* ── TOUCH ZONES ── */
    #touch-p1-zone, #touch-p2-zone {
      position:absolute; top:0; bottom:0; width:50%;
      display:none; align-items:center; justify-content:center; pointer-events:none;
    }
    #touch-p1-zone { left:0; }
    #touch-p2-zone { right:0; }
    .touch-label { font-size:clamp(.45rem,1.2vw,.62rem); letter-spacing:.1em; color:rgba(255,255,255,.08); text-transform:uppercase; writing-mode:vertical-rl; }

    /* ── PORTRAIT WARNING ── */
    #portrait-warn {
      display:none; position:fixed; inset:0; z-index:999;
      background:#0d0d1a; color:#aaa;
      flex-direction:column; align-items:center; justify-content:center;
      gap:16px; font-size:1rem; text-align:center; padding:24px;
    }
    #portrait-warn .big { font-size:3rem; }
  </style>
</head>

</div><!-- /root -->

// Pre-load avatar images into Image objects
var avatarImgs = {};
AVATARS.forEach(function(a) {
  var img = new Image();
  img.src = a.src;
  avatarImgs[a.id] = img;
});

var catBallImg = new Image();
catBallImg.src = BALL_SRC;

// Canvas setup
var canvas = document.getElementById('c');
var ctx = canvas.getContext('2d');
var W = canvas.width, H = canvas.height;

var PADDLE_W = 12, PADDLE_H = 100, BALL_R = 32;
var WIN_SCORE = 7;
var BASE_SPEED = 3;
var MAX_SPEED = 16;

// Game config
var mode = '1p';
var diff = 'medium';
var AI_SPEED = { easy: 3.0, medium: 4.5, hard: 6.8 };
var p1AvatarId = AVATARS[0].id;
var p2AvatarId = BOOGEY_ID;

var state = {
  p1: { y: H/2 - PADDLE_H/2, score: 0 },
  p2: { y: H/2 - PADDLE_H/2, score: 0 },
  ball: { x: W/2, y: H/2, vx: 0, vy: 0, spin: 0 },
  running: false,
  scoring: false,
  particles: [],
  flashes: [],
  rallyHits: 0
};

var keys = {};
document.addEventListener('keydown', function(e) {
  keys[e.key] = true;
  if (e.key === 'ArrowUp' || e.key === 'ArrowDown' || e.key === ' ') e.preventDefault();
});
document.addEventListener('keyup', function(e) { keys[e.key] = false; });

// Helpers
function getAvatar(id) {
  for (var i = 0; i < AVATARS.length; i++) { if (AVATARS[i].id === id) return AVATARS[i]; }
  return null;
}

function updateScoreboard() {
  document.getElementById('p1-score').textContent = state.p1.score;
  document.getElementById('p2-score').textContent = state.p2.score;
}

function updateScoreboardAvatars() {
  var a1 = getAvatar(p1AvatarId);
  var a2 = mode === '1p' ? getAvatar(BOOGEY_ID) : getAvatar(p2AvatarId);
  document.getElementById('sb-p1-img').src = a1 ? a1.src : '';
  document.getElementById('sb-p1-name').textContent = a1 ? a1.name : 'P1';
  document.getElementById('sb-p2-img').src = a2 ? a2.src : '';
  document.getElementById('sb-p2-name').textContent = a2 ? a2.name : 'AI';
  document.getElementById('p2-label').textContent = mode === '1p' ? (a2 ? a2.name : 'AI') : 'P2';
}

function updateSpeedBar(spd) {
  var pct = Math.min(100, ((spd - BASE_SPEED) / (MAX_SPEED - BASE_SPEED)) * 100);
  document.getElementById('speed-bar-fill').style.width = pct + '%';
  document.getElementById('speed-label').textContent = spd.toFixed(1);
}

// Avatar selection - stored globally, updated by click handlers set via data attributes
function selectAvatar(whom, id) {
  if (whom === 'p1') p1AvatarId = id;
  else p2AvatarId = id;
  if (mode === '1p') p2AvatarId = BOOGEY_ID;
  buildMenu();
}

function setMode(m) {
  mode = m;
  if (mode === '1p') p2AvatarId = BOOGEY_ID;
  updateControlHint();
  buildMenu();
}

function setDiff(d) {
  diff = d;
  buildMenu();
}

// Build avatar grid DOM elements properly (no inline onclick with quotes)
function makeGrid(forWhom, container) {
  container.innerHTML = '';
  var selId = forWhom === 'p1' ? p1AvatarId : p2AvatarId;
  var color = forWhom === 'p1' ? '#89ddff' : '#f07178';

  AVATARS.forEach(function(a) {
    var wrap = document.createElement('div');
    wrap.className = 'av-wrap';

    var opt = document.createElement('div');
    opt.className = 'av-opt' + (selId === a.id ? (forWhom === 'p1' ? ' sel-p1' : ' sel-p2') : '');

    var img = document.createElement('img');
    img.src = a.src;
    img.alt = a.name;
    opt.appendChild(img);

    (function(capturedId, capturedWhom) {
      opt.addEventListener('click', function() { selectAvatar(capturedWhom, capturedId); });
    })(a.id, forWhom);

    var label = document.createElement('div');
    label.className = 'av-name';
    label.textContent = a.name;

    wrap.appendChild(opt);
    wrap.appendChild(label);
    container.appendChild(wrap);
  });
}

function buildMenu() {
  var overlay = document.getElementById('overlay');
  overlay.innerHTML = '';

  // Title
  var title = document.createElement('h2');
  title.textContent = '\uD83D\uDC3E Belly Ball';
  overlay.appendChild(title);

  // Mode toggle row
  var modeRow = document.createElement('div');
  modeRow.className = 'row';

  var modeLabel = document.createElement('span');
  modeLabel.style.cssText = 'color:#aaa;font-size:.8rem;letter-spacing:.1em';
  modeLabel.textContent = 'MODE:';
  modeRow.appendChild(modeLabel);

  var btn1p = document.createElement('button');
  btn1p.className = 'tog-btn' + (mode === '1p' ? ' active' : '');
  btn1p.textContent = '1 Player';
  btn1p.addEventListener('click', function() { setMode('1p'); });
  modeRow.appendChild(btn1p);

  var btn2p = document.createElement('button');
  btn2p.className = 'tog-btn' + (mode === '2p' ? ' active' : '');
  btn2p.textContent = '2 Players';
  btn2p.addEventListener('click', function() { setMode('2p'); });
  modeRow.appendChild(btn2p);

  overlay.appendChild(modeRow);

  // Avatar section
  var avSection = document.createElement('div');
  avSection.style.cssText = 'display:flex;gap:20px;align-items:flex-start;flex-wrap:wrap;justify-content:center;';

  if (mode === '1p') {
    // P1 picker
    var p1Col = document.createElement('div');
    var p1Label = document.createElement('div');
    p1Label.className = 'picker-label';
    p1Label.style.color = '#89ddff';
    p1Label.textContent = 'Your Cat';
    var p1Grid = document.createElement('div');
    p1Grid.className = 'avatar-grid';
    makeGrid('p1', p1Grid);
    p1Col.appendChild(p1Label);
    p1Col.appendChild(p1Grid);
    avSection.appendChild(p1Col);

    // Big Binx locked display
    var boogey = getAvatar(BOOGEY_ID);
    var aiCol = document.createElement('div');
    aiCol.style.cssText = 'display:flex;flex-direction:column;align-items:center;gap:6px;margin-top:4px;';
    var aiLabel = document.createElement('div');
    aiLabel.className = 'picker-label';
    aiLabel.style.color = '#f07178';
    aiLabel.textContent = 'You face';
    var aiImgWrap = document.createElement('div');
    aiImgWrap.style.cssText = 'width:64px;height:64px;border-radius:50%;border:3px solid #f07178;overflow:hidden;box-shadow:0 0 12px #f0717888;';
    var aiImg = document.createElement('img');
    aiImg.src = boogey ? boogey.src : '';
    aiImg.style.cssText = 'width:100%;height:100%;object-fit:cover;';
    aiImgWrap.appendChild(aiImg);
    var aiName = document.createElement('div');
    aiName.style.cssText = 'font-size:.8rem;color:#f07178;font-weight:700;';
    aiName.textContent = boogey ? boogey.name : 'AI';
    aiCol.appendChild(aiLabel);
    aiCol.appendChild(aiImgWrap);
    aiCol.appendChild(aiName);
    avSection.appendChild(aiCol);
  } else {
    // P1 picker
    var p1Col2 = document.createElement('div');
    var p1Label2 = document.createElement('div');
    p1Label2.className = 'picker-label';
    p1Label2.style.color = '#89ddff';
    p1Label2.textContent = 'P1 \u2014 Choose Your Cat';
    var p1Grid2 = document.createElement('div');
    p1Grid2.className = 'avatar-grid';
    makeGrid('p1', p1Grid2);
    p1Col2.appendChild(p1Label2);
    p1Col2.appendChild(p1Grid2);
    avSection.appendChild(p1Col2);

    // Divider
    var div = document.createElement('div');
    div.style.cssText = 'width:1px;background:#1e1e3a;align-self:stretch;';
    avSection.appendChild(div);

    // P2 picker
    var p2Col = document.createElement('div');
    var p2Label = document.createElement('div');
    p2Label.className = 'picker-label';
    p2Label.style.color = '#f07178';
    p2Label.textContent = 'P2 \u2014 Choose Your Cat';
    var p2Grid = document.createElement('div');
    p2Grid.className = 'avatar-grid';
    makeGrid('p2', p2Grid);
    p2Col.appendChild(p2Label);
    p2Col.appendChild(p2Grid);
    avSection.appendChild(p2Col);
  }
  overlay.appendChild(avSection);

  // Difficulty (1P only)
  if (mode === '1p') {
    var diffRow = document.createElement('div');
    diffRow.style.cssText = 'display:flex;gap:8px;';
    ['easy','medium','hard'].forEach(function(d) {
      var btn = document.createElement('button');
      btn.className = 'diff-btn' + (diff === d ? ' active' : '');
      btn.textContent = d.charAt(0).toUpperCase() + d.slice(1);
      btn.addEventListener('click', function() { setDiff(d); });
      diffRow.appendChild(btn);
    });
    overlay.appendChild(diffRow);
  }

  // Controls hint
  var hint = document.createElement('p');
  hint.innerHTML = mode === '1p'
    ? '<strong style="color:#89ddff">P1:</strong> W / S &nbsp;&middot; First to <strong>7</strong> wins'
    : '<strong style="color:#89ddff">P1:</strong> W / S &nbsp; <strong style="color:#f07178">P2:</strong> &uarr; / &darr; &nbsp;&middot; First to <strong>7</strong> wins';
  overlay.appendChild(hint);

  // Play button
  var playBtn = document.createElement('button');
  playBtn.className = 'play-btn';
  playBtn.textContent = '\u25B6 Play';
  playBtn.addEventListener('click', startGame);
  overlay.appendChild(playBtn);

  overlay.style.display = 'flex';

  // Always keep the scoreboard chips in sync with current selection
  updateScoreboardAvatars();
}

// Ball
function resetBall(dir) {
  dir = dir || 1;
  var ang = (Math.random() * 50 - 25) * Math.PI / 180;
  state.ball.x = W/2; state.ball.y = H/2;
  state.ball.vx = Math.cos(ang) * BASE_SPEED * dir;
  state.ball.vy = Math.sin(ang) * BASE_SPEED;
  state.ball.spin = 0;
  state.rallyHits = 0;
}

// Game lifecycle
var raf = null;

function startGame() {
  if (raf !== null) { cancelAnimationFrame(raf); raf = null; }
  if (mode === '1p') p2AvatarId = BOOGEY_ID;
  state.p1.score = 0; state.p2.score = 0;
  updateScoreboard();
  updateScoreboardAvatars();
  resetBall(Math.random() > 0.5 ? 1 : -1);
  state.p1.y = H/2 - PADDLE_H/2;
  state.p2.y = H/2 - PADDLE_H/2;
  state.particles = [];
  state.scoring = false;
  state.flashes = [];
  state.running = true;
  document.getElementById('overlay').style.display = 'none';
  loop();
}

function showWin(title, msg) {
  var overlay = document.getElementById('overlay');
  overlay.innerHTML = '';

  var h = document.createElement('h2');
  h.textContent = title;
  overlay.appendChild(h);

  var p = document.createElement('p');
  p.textContent = msg;
  overlay.appendChild(p);

  var row = document.createElement('div');
  row.className = 'row';

  var again = document.createElement('button');
  again.className = 'play-btn';
  again.textContent = '\u25B6 Play Again';
  again.addEventListener('click', startGame);
  row.appendChild(again);

  var menu = document.createElement('button');
  menu.className = 'ghost-btn';
  menu.textContent = 'Menu';
  menu.addEventListener('click', buildMenu);
  row.appendChild(menu);

  overlay.appendChild(row);
  overlay.style.display = 'flex';
}

// Particles
function spawnFlash(side, color) {
  // Flash the score element and spawn a big burst of canvas particles from the wall
  var elId = side === 'p1' ? 'p1-score' : 'p2-score';
  var el = document.getElementById(elId);
  el.classList.remove('score-pop');
  void el.offsetWidth; // force reflow so animation restarts
  el.classList.add('score-pop');
  // Big wall burst
  var wx = side === 'p1' ? W : 0;
  for (var i = 0; i < 40; i++) {
    var ang = Math.random() * Math.PI * 2;
    var spd = 2 + Math.random() * 7;
    state.flashes.push({
      x: wx, y: Math.random() * H,
      vx: Math.cos(ang) * spd * (side === 'p1' ? -1 : 1),
      vy: Math.sin(ang) * spd,
      life: 1, size: 3 + Math.random() * 8, color: color
    });
  }
  // Central text flash on canvas
  state.flashes.push({ type: 'text', x: W/2, y: H/2, life: 1,
    text: side === 'p1' ? '+1 P1!' : '+1 P2!', color: color });
}

function updateFlashes() {
  state.flashes = state.flashes.filter(function(f){ return f.life > 0.02; });
  for (var i = 0; i < state.flashes.length; i++) {
    var f = state.flashes[i];
    if (f.type !== 'text') { f.x += f.vx; f.y += f.vy; f.vy += 0.15; }
    f.life -= 0.03;
  }
}

function drawFlashes() {
  for (var i = 0; i < state.flashes.length; i++) {
    var f = state.flashes[i];
    ctx.save();
    ctx.globalAlpha = f.life;
    if (f.type === 'text') {
      ctx.font = 'bold ' + Math.round(80 * f.life) + 'px monospace';
      ctx.fillStyle = f.color;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.shadowColor = f.color;
      ctx.shadowBlur = 30;
      ctx.fillText(f.text, f.x, f.y);
    } else {
      ctx.fillStyle = f.color;
      ctx.beginPath();
      ctx.arc(f.x, f.y, Math.max(0, f.size * f.life), 0, Math.PI*2);
      ctx.fill();
    }
    ctx.restore();
  }
}

function spawnParticles(x, y, color) {
  for (var i = 0; i < 18; i++) {
    var ang = Math.random() * Math.PI * 2;
    var spd = 1 + Math.random() * 4;
    state.particles.push({ x:x, y:y, vx:Math.cos(ang)*spd, vy:Math.sin(ang)*spd, life:1, color:color });
  }
}

function updateParticles() {
  var alive = [];
  for (var i = 0; i < state.particles.length; i++) {
    var p = state.particles[i];
    p.x += p.vx; p.y += p.vy; p.vy += 0.1; p.life -= 0.04;
    if (p.life > 0.02) alive.push(p);
  }
  state.particles = alive;
}

function drawParticles() {
  for (var i = 0; i < state.particles.length; i++) {
    var p = state.particles[i];
    ctx.save();
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, Math.max(0, 4 * p.life), 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

// Main loop
function loop() {
  if (!state.running) return;
  update();
  draw();
  raf = requestAnimationFrame(loop);
}

function update() {
  var b = state.ball, p1 = state.p1, p2 = state.p2, pspd = 9;

  if ((keys['w'] || keys['W']) && p1.y > 0)           p1.y -= pspd;
  if ((keys['s'] || keys['S']) && p1.y < H-PADDLE_H)  p1.y += pspd;

  if (mode === '2p') {
    if (keys['ArrowUp']   && p2.y > 0)           p2.y -= pspd;
    if (keys['ArrowDown'] && p2.y < H-PADDLE_H)  p2.y += pspd;
  } else {
    var aispd = AI_SPEED[diff], target = b.y - PADDLE_H/2;
    if (p2.y < target-2) p2.y = Math.min(p2.y+aispd, H-PADDLE_H);
    if (p2.y > target+2) p2.y = Math.max(p2.y-aispd, 0);
  }

  b.x += b.vx; b.y += b.vy; b.spin += 0.045;

  if (b.y-BALL_R < 0)  { b.y = BALL_R;   b.vy =  Math.abs(b.vy); spawnParticles(b.x,0,'#89ddff'); }
  if (b.y+BALL_R > H)  { b.y = H-BALL_R; b.vy = -Math.abs(b.vy); spawnParticles(b.x,H,'#89ddff'); }

  // P1 paddle
  // P1 paddle at x=16, right edge at 16+PADDLE_W=28
  if (b.x-BALL_R <= 28 && b.x > 14 &&
      b.y+BALL_R > p1.y && b.y-BALL_R < p1.y+PADDLE_H && b.vx < 0) {
    state.rallyHits++;
    var s1 = Math.hypot(b.vx,b.vy), ns1 = Math.min(MAX_SPEED, s1*1.045);
    var r1 = (b.y-(p1.y+PADDLE_H/2))/(PADDLE_H/2);
    b.vy = r1 * ns1 * 0.65;            // vy is at most 65% of total speed
    b.vx = Math.sqrt(ns1*ns1 - b.vy*b.vy); // vx always has room, no NaN
    spawnParticles(b.x,b.y,'#c3e88d');
  }

  // P2 paddle
  // P2 paddle at x=W-PADDLE_W-16=1072, left edge at 1072
  if (b.x+BALL_R >= W-PADDLE_W-16 && b.x < W-14 &&
      b.y+BALL_R > p2.y && b.y-BALL_R < p2.y+PADDLE_H && b.vx > 0) {
    state.rallyHits++;
    var s2 = Math.hypot(b.vx,b.vy), ns2 = Math.min(MAX_SPEED, s2*1.045);
    var r2 = (b.y-(p2.y+PADDLE_H/2))/(PADDLE_H/2);
    b.vy = r2 * ns2 * 0.65;            // vy is at most 65% of total speed
    b.vx = -Math.sqrt(ns2*ns2 - b.vy*b.vy); // vx always has room, no NaN
    spawnParticles(b.x,b.y,'#f07178');
  }

  var spd = Math.hypot(b.vx,b.vy);
  if (b.vx !== 0 || b.vy !== 0) updateSpeedBar(spd);

  if (b.x-BALL_R < 0 && !state.scoring) {
    state.scoring = true;
    p2.score++; updateScoreboard(); spawnParticles(0,b.y,'#f07178');
    spawnFlash('p2', '#f07178');
    if (p2.score >= WIN_SCORE) {
      state.running = false;
      var w2 = getAvatar(p2AvatarId);
      showWin(mode==='1p' ? '\uD83D\uDE3F You Lost!' : '\uD83D\uDD34 P2 Wins!',
              (w2 ? w2.name : 'P2') + (mode==='1p' ? ' wins! Better luck next time.' : ' takes it! Rematch?'));
      return;
    }
    b.vx=0; b.vy=0; setTimeout(function(){ resetBall(1); state.scoring = false; }, 600);
  }

  if (b.x+BALL_R > W && !state.scoring) {
    state.scoring = true;
    p1.score++; updateScoreboard(); spawnParticles(W,b.y,'#c3e88d');
    spawnFlash('p1', '#c3e88d');
    if (p1.score >= WIN_SCORE) {
      state.running = false;
      var w1 = getAvatar(p1AvatarId);
      showWin(mode==='1p' ? '\uD83D\uDE3A You Win!' : '\uD83D\uDD35 P1 Wins!',
              (w1 ? w1.name : 'P1') + (mode==='1p' ? ' wins! The kitty reigns.' : ' takes the crown! Rematch?'));
      return;
    }
    b.vx=0; b.vy=0; setTimeout(function(){ resetBall(-1); state.scoring = false; }, 600);
  }

  updateParticles();
  updateFlashes();
}

function drawPaddle(x, y, color, glow) {
  ctx.save();
  ctx.shadowColor=glow; ctx.shadowBlur=18; ctx.fillStyle=color;
  var r=5;
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+PADDLE_W-r,y);
  ctx.quadraticCurveTo(x+PADDLE_W,y,x+PADDLE_W,y+r);
  ctx.lineTo(x+PADDLE_W,y+PADDLE_H-r);
  ctx.quadraticCurveTo(x+PADDLE_W,y+PADDLE_H,x+PADDLE_W-r,y+PADDLE_H);
  ctx.lineTo(x+r,y+PADDLE_H);
  ctx.quadraticCurveTo(x,y+PADDLE_H,x,y+PADDLE_H-r);
  ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath(); ctx.fill(); ctx.restore();
}

function drawAvatarAbovePaddle(avatarId, px, py) {
  var img = avatarImgs[avatarId];
  if (!img || !img.complete || !img.naturalWidth) return;
  var cx=px+PADDLE_W/2, cy=py-22, R=16;
  ctx.save();
  ctx.beginPath(); ctx.arc(cx,cy,R,0,Math.PI*2); ctx.clip();
  ctx.drawImage(img,cx-R,cy-R,R*2,R*2);
  ctx.restore();
  ctx.save();
  ctx.beginPath(); ctx.arc(cx,cy,R,0,Math.PI*2);
  ctx.strokeStyle = avatarId===BOOGEY_ID ? '#f07178' : '#89ddff';
  ctx.lineWidth=2; ctx.stroke(); ctx.restore();
}

function draw() {
  ctx.fillStyle='#0d0d1a'; ctx.fillRect(0,0,W,H);
  ctx.setLineDash([12,10]); ctx.strokeStyle='#1e1e3a'; ctx.lineWidth=3;
  ctx.beginPath(); ctx.moveTo(W/2,0); ctx.lineTo(W/2,H); ctx.stroke();
  ctx.setLineDash([]);

  drawPaddle(16, state.p1.y, '#89ddff', '#89ddff88');
  drawPaddle(W-PADDLE_W-16, state.p2.y, '#f07178', '#f0717888');

  var p2disp = mode==='1p' ? BOOGEY_ID : p2AvatarId;
  drawAvatarAbovePaddle(p1AvatarId, 16, state.p1.y);
  drawAvatarAbovePaddle(p2disp, W-PADDLE_W-16, state.p2.y);

  var b=state.ball;
  ctx.save();
  ctx.translate(b.x,b.y); ctx.rotate(b.spin);
  ctx.shadowColor='#c792ea'; ctx.shadowBlur=22;
  ctx.beginPath(); ctx.arc(0,0,BALL_R,0,Math.PI*2); ctx.clip();
  if (catBallImg.complete && catBallImg.naturalWidth>0)
    ctx.drawImage(catBallImg,-BALL_R,-BALL_R,BALL_R*2,BALL_R*2);
  else { ctx.fillStyle='#c792ea'; ctx.fill(); }
  ctx.restore();

  drawParticles();
  drawFlashes();

  var a1=getAvatar(p1AvatarId), a2=mode==='1p'?getAvatar(BOOGEY_ID):getAvatar(p2AvatarId);
  ctx.font='11px monospace'; ctx.fillStyle='#2a2a4a';
  ctx.textAlign='left';  ctx.fillText(a1?a1.name:'P1', 22, 20);
  ctx.textAlign='right'; ctx.fillText(a2?a2.name:'AI', W-22, 20);
}


// ── RESPONSIVE CANVAS SCALING ───────────────────────────────────────────────
function getCanvasScale() {
  var rect = canvas.getBoundingClientRect();
  return { sx: W / rect.width, sy: H / rect.height };
}

// ── DEVICE DETECTION ─────────────────────────────────────────────────────────
var isMobile = (function() {
  return ('ontouchstart' in window) ||
    (navigator.maxTouchPoints > 0) ||
    /Mobi|Android|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
})();

function updateControlHint() {
  var hint = document.getElementById('ctrl-hint');
  if (isMobile) {
    hint.textContent = mode === '2p'
      ? 'P1: slide left side  |  P2: slide right side'
      : 'Slide anywhere to move your paddle';
  } else {
    hint.textContent = 'P1: W / S  |  P2 (2-player): ↑ / ↓';
  }
}

function checkOrientation() {
  var warn = document.getElementById('portrait-warn');
  var isPortrait = window.innerHeight > window.innerWidth;
  // Only show portrait warning on actual mobile/touch devices
  warn.style.display = (isMobile && isPortrait) ? 'flex' : 'none';
}
window.addEventListener('resize', function() { checkOrientation(); updateControlHint(); });
window.addEventListener('orientationchange', function() {
  setTimeout(function() { checkOrientation(); updateControlHint(); }, 200);
});
checkOrientation();
updateControlHint();

// ── TOUCH CONTROLS ───────────────────────────────────────────────────────────
var touches = {}; // track active touch IDs

function getTouchY(touch) {
  var rect = canvas.getBoundingClientRect();
  var scale = H / rect.height;
  return (touch.clientY - rect.top) * scale;
}
function getTouchX(touch) {
  var rect = canvas.getBoundingClientRect();
  return touch.clientX - rect.left;
}

function showTouchZones(show) {
  document.getElementById('touch-p1-zone').style.display = show ? 'flex' : 'none';
  document.getElementById('touch-p2-zone').style.display = (show && mode === '2p') ? 'flex' : 'none';
}

canvas.addEventListener('touchstart', function(e) {
  e.preventDefault();
  if (!state.running) return;
  for (var i = 0; i < e.changedTouches.length; i++) {
    var t = e.changedTouches[i];
    touches[t.identifier] = { x: getTouchX(t), y: getTouchY(t) };
  }
}, { passive: false });

canvas.addEventListener('touchmove', function(e) {
  e.preventDefault();
  if (!state.running) return;
  var rect = canvas.getBoundingClientRect();
  var halfW = rect.width / 2;

  for (var i = 0; i < e.changedTouches.length; i++) {
    var t = e.changedTouches[i];
    var newY = getTouchY(t);
    var touchX = getTouchX(t);
    var prev = touches[t.identifier];
    if (!prev) { touches[t.identifier] = { x: touchX, y: newY }; continue; }

    var dy = newY - prev.y;
    touches[t.identifier] = { x: touchX, y: newY };

    if (mode === '1p') {
      // Any touch moves P1
      state.p1.y = Math.max(0, Math.min(H - PADDLE_H, state.p1.y + dy));
    } else {
      // Left half = P1, right half = P2
      if (touchX < halfW) {
        state.p1.y = Math.max(0, Math.min(H - PADDLE_H, state.p1.y + dy));
      } else {
        state.p2.y = Math.max(0, Math.min(H - PADDLE_H, state.p2.y + dy));
      }
    }
  }
}, { passive: false });

canvas.addEventListener('touchend', function(e) {
  e.preventDefault();
  for (var i = 0; i < e.changedTouches.length; i++) {
    delete touches[e.changedTouches[i].identifier];
  }
}, { passive: false });

// Show/hide touch zones based on game state
var _origStartGame = startGame;
startGame = function() {
  _origStartGame();
  showTouchZones(true);
};
var _origBuildMenu = buildMenu;
buildMenu = function() {
  _origBuildMenu();
  showTouchZones(false);
};

// Boot
p2AvatarId = BOOGEY_ID;
buildMenu();
catBallImg.onload = function() { draw(); };
draw();

// ── SERVICE WORKER REGISTRATION ──────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('sw.js').then(function(reg) {
      console.log('SW registered:', reg.scope);
    }).catch(function(err) {
      console.log('SW registration failed:', err);
    });
  });
}

// Reset button — always visible, kicks back to menu and kills any running loop
document.getElementById('reset-btn').addEventListener('click', function() {
  if (raf !== null) { cancelAnimationFrame(raf); raf = null; }
  state.running = false;
  state.scoring = false;
  state.flashes = [];
  state.p1.score = 0; state.p2.score = 0;
  state.particles = [];
  updateScoreboard();
  buildMenu();
});



// ── SERVICE WORKER REGISTRATION ──────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('sw.js').catch(function(){});
  });
}

// ── LOAD DECORATIVE CATS ─────────────────────────────────────────────────────
(function() {
  var ids = ['deco-0','deco-1','deco-2','deco-0b'];
  var srcs = [DECO_CATS[0], DECO_CATS[1], DECO_CATS[2], DECO_CATS[0]];
  ids.forEach(function(id, i) {
    var el = document.getElementById(id);
    if (el) el.src = srcs[i];
  });
})();
